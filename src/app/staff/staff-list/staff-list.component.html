<td data-label="#" class="row-num">{{ i + 1 }}</td>

<td data-label="Staff Member">
  <div class="d-flex align-items-center gap-2">
    <div class="table-avatar">{{ member.fullName?.charAt(0) || 'S' }}</div>
    <div>
      <div class="patient-name">{{ member.fullName }}</div>
      <div class="staff-email">{{ member.email }}</div>
    </div>
  </div>
</td>

<td data-label="Role">
  <span class="role-pill" [ngClass]="getRoleClass(member.role)">
    {{ member.role }}
  </span>
</td>

<td data-label="Phone" class="td-muted">
  {{ member.phone }}
</td>

<td data-label="Join Date" class="td-muted">
  {{ member.createdAt | date:'MMM d, y' }}
</td>

<td data-label="Status">
  <div class="toggle-wrap" (click)="toggleStatus(member)">
    <div class="toggle-track" [class.toggle-on]="member.status === 'Active'">
      <div class="toggle-thumb"></div>
    </div>
    <span class="toggle-label"
      [style.color]="member.status === 'Active' ? '#2f9e44' : '#e03131'">
      {{ member.status }}
    </span>
  </div>
</td>

<td data-label="Actions">
  <div class="action-group">
    <a [routerLink]="['/staff/edit', member.id]" class="act-btn act-edit">Edit</a>
    <button class="act-btn act-delete" (click)="delete(member.id)">Delete</button>
  </div>
</td>
