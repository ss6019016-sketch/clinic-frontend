<tbody>
  <tr *ngFor="let patient of filteredPatients; let i = index">
    <td data-label="#" class="row-num">
      {{ i + 1 }}
    </td>

    <td data-label="Patient">
      <div class="d-flex align-items-center gap-2">
        <div class="table-avatar">
          {{ patient.fullName?.charAt(0) }}
        </div>
        <span class="patient-name">
          {{ patient.fullName }}
        </span>
      </div>
    </td>

    <td data-label="Age" class="td-muted">
      {{ patient.age }} yrs
    </td>

    <td data-label="Gender">
      <span
        class="pill"
        [ngClass]="patient.gender === 'Male' ? 'pill-blue' : 'pill-pink'">
        {{ patient.gender }}
      </span>
    </td>

    <td data-label="Phone" class="td-muted">
      {{ patient.phone }}
    </td>

    <td data-label="Disease">
      <span class="pill pill-gray">
        {{ patient.disease || 'N/A' }}
      </span>
    </td>

    <td data-label="Actions">
      <div class="action-group">
        <a
          [routerLink]="['/patients/details', patient.id]"
          class="act-btn act-view">
          View
        </a>

        <a
          [routerLink]="['/patients/edit', patient.id]"
          class="act-btn act-edit">
          Edit
        </a>

        <button
          class="act-btn act-delete"
          (click)="deletePatient(patient.id)">
          Delete
        </button>
      </div>
    </td>
  </tr>

  <tr *ngIf="filteredPatients.length === 0">
    <td colspan="7" class="empty-row">
      <span style="font-size:1.8rem;">😕</span>
      <p>No patients found</p>
    </td>
  </tr> 
</tbody>
