<td data-label="#" class="row-num">{{ i + 1 }}</td>

<td data-label="Doctor">
  <div class="d-flex align-items-center gap-2">
    <div class="table-avatar doctor-av">
      {{ doctor.fullName?.charAt(4) || 'D' }}
    </div>
    <span class="patient-name">{{ doctor.fullName }}</span>
  </div>
</td>

<td data-label="Specialization">
  <span class="pill pill-green">
    {{ doctor.specialization }}
  </span>
</td>

<td data-label="Phone" class="td-muted">
  {{ doctor.phone }}
</td>

<td data-label="Experience">
  <span style="font-weight:700;">{{ doctor.experience }}</span>
  <span class="td-muted"> yrs</span>
</td>

<td data-label="Fee">
  <span class="fee-val">Rs. {{ doctor.fee }}</span>
</td>

<td data-label="Actions">
  <div class="action-group">
    <a [routerLink]="['/doctors/details', doctor.id]" class="act-btn act-view">View</a>
    <a [routerLink]="['/doctors/edit', doctor.id]" class="act-btn act-edit">Edit</a>
    <button class="act-btn act-delete" (click)="deleteDoctor(doctor.id)">Delete</button>
  </div>
</td>
