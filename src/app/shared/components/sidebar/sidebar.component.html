<div class="sidebar-overlay"
  [class.show]="isOpen"
  (click)="close()">
</div>

<div class="sidebar" [class.open]="isOpen">

  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🏥</div>
      <div class="sidebar-logo-text">
        Clinic Admin
        <span>Management System</span>
      </div>
    </div>
    <button class="sidebar-close-btn" (click)="close()">✕</button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-title">Main Menu</div>
    <ul class="nav flex-column">
      <li class="nav-item" *ngFor="let item of menuItems">
        <a class="nav-link"
          [routerLink]="item.route"
          routerLinkActive="active-link"
          (click)="close()">
          <div class="nav-icon">{{ item.icon }}</div>
          <span>{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Footer — Real Image ya Initials -->
  <div class="sidebar-footer">
    <a routerLink="/settings" class="sidebar-user" (click)="close()">

      <!-- Photo hai to show karo -->
      <img
        *ngIf="profilePhoto"
        [src]="profilePhoto"
        class="sidebar-user-img"
        alt="Profile"
        (error)="profilePhoto = null"
      />

      <!-- Photo nahi to initials -->
      <div *ngIf="!profilePhoto" class="sidebar-user-avatar">
        {{ userName.charAt(0) }}
      </div>

      <div class="sidebar-user-info">
        <div class="sidebar-user-name">{{ userName }}</div>
        <div class="sidebar-user-role">{{ userRole }}</div>
      </div>

      <div class="sidebar-settings-icon">⚙️</div>

    </a>
  </div>

</div>
