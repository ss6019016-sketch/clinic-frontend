<div class="sidebar-overlay"
  [class.show]="isOpen"
  (click)="close()">
</div>

<div class="sidebar" [class.open]="isOpen">

  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><i class="bi bi-hospital"></i></div>
      <div class="sidebar-logo-text">
        Clinic Admin
        <span>Management System</span>
      </div>
    </div>
    <button class="sidebar-close-btn" (click)="close()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-title">Main Menu</div>
    <ul class="nav flex-column">
      <li class="nav-item" *ngFor="let item of menuItems">
        <a class="nav-link"
          [routerLink]="item.route"
          routerLinkActive="active-link"
          (click)="close()">
          <div class="nav-icon"><i class="bi" [ngClass]="item.icon"></i></div>
          <span>{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-user-avatar">S</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">Sami Shaheen</div>
        <div class="sidebar-user-role">Administrator</div>
      </div>
    </div>
  </div>

</div>
