<nav class="top-navbar">
  <div class="navbar-left">
    <button class="hamburger-btn" type="button" (click)="toggleSidebar()">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="page-breadcrumb">
      <span class="breadcrumb-home">Home</span>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current">Dashboard</span>
    </div>
  </div>

  <div class="navbar-right">
    <div class="navbar-date">
      <i class="bi bi-calendar3"></i> {{ today | date:'EEE, MMM d, y' }}
    </div>
    <div class="navbar-divider"></div>

    <!-- Profile Section -->
    <div class="navbar-user">

      <!-- Agar photo hai to image show karo -->
      <div class="nav-avatar-wrap">
        <img
          *ngIf="profilePhoto"
          [src]="profilePhoto"
          class="nav-user-img"
          alt="Profile"
          (error)="profilePhoto = null"
        />
        <!-- Agar photo nahi hai to initials -->
        <div *ngIf="!profilePhoto" class="user-avatar">
          {{ userName.charAt(0) }}
        </div>
      </div>

      <div class="user-info">
        <div class="user-name">{{ userName }}</div>
        <div class="user-role">{{ userRole }}</div>
      </div>
    </div>

    <button class="logout-btn" type="button" (click)="logout()">
      <i class="bi bi-box-arrow-right"></i> Logout
    </button>
  </div>
</nav>
