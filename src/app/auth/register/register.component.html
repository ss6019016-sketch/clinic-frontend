<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="card shadow auth-card">
    <div class="card-body p-4">

      <div class="text-center mb-4">
        <h3>🏥 Clinic Management</h3>
        <p class="text-muted">Create a new account</p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" formControlName="fullName"
            [class.is-invalid]="f['fullName'].invalid && f['fullName'].touched" />
          <div class="invalid-feedback">Name is required</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email"
            [class.is-invalid]="f['email'].invalid && f['email'].touched" />
          <div class="invalid-feedback">Valid email is required</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" formControlName="password"
            [class.is-invalid]="f['password'].invalid && f['password'].touched" />
          <div class="invalid-feedback">Password must be at least 6 characters</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" formControlName="confirmPassword"
            [class.is-invalid]="(f['confirmPassword'].touched && registerForm.hasError('passwordMismatch')) || (f['confirmPassword'].invalid && f['confirmPassword'].touched)" />
          <div class="invalid-feedback" *ngIf="registerForm.hasError('passwordMismatch') && f['confirmPassword'].touched">
            Passwords do not match
          </div>
        </div>

        <button type="submit" class="btn w-100" style="background-color:#F5A623; color:#000;">
          Register
        </button>

        <p class="text-center mt-3 mb-0">
          Already have an account? <a routerLink="/auth/login">Login here</a>
        </p>

      </form>

    </div>
  </div>
</div>
