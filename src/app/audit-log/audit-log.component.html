<div class="audit-log-container">
  <div class="page-header">
    <h2>Audit Log</h2>
    <p class="subtitle">Track kis staff member ne kya create/update/delete kiya</p>
  </div>

  <div class="filters">
    <select [(ngModel)]="entityFilter" (change)="load()">
      <option value="">All Modules</option>
      <option *ngFor="let e of entityOptions" [value]="e">{{ e }}</option>
    </select>

    <input type="date" [(ngModel)]="fromFilter" (change)="load()" />
    <input type="date" [(ngModel)]="toFilter" (change)="load()" />

    <button class="btn-clear" (click)="clearFilters()">Clear</button>
  </div>

  <div *ngIf="isLoading" class="loading">Loading...</div>

  <table *ngIf="!isLoading" class="audit-table">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>User</th>
        <th>Role</th>
        <th>Action</th>
        <th>Module</th>
        <th>Record ID</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let log of logs">
        <td>{{ log.timestamp | date:'medium' }}</td>
        <td>{{ log.userName }}</td>
        <td>{{ log.role }}</td>
        <td><span class="badge" [ngClass]="actionBadgeClass(log.action)">{{ log.action }}</span></td>
        <td>{{ log.entity }}</td>
        <td>#{{ log.entityId }}</td>
        <td>{{ log.details || '-' }}</td>
      </tr>
      <tr *ngIf="logs.length === 0">
        <td colspan="7" class="empty-row">Koi log nahi mila</td>
      </tr>
    </tbody>
  </table>
</div>
